<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tenalet Kit Demo - Dashboard</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav>
    <a href="/" class="brand">Tenalet Kit Demo</a>
    <span id="mode-badge" class="mode-badge"></span>
    <a href="/" class="active">Dashboard</a>
    <a href="/webhooks.html">Webhooks</a>
  </nav>

  <div class="container">
    <div class="split">
      <!-- Left: Create Tolet -->
      <div class="card">
        <h2>Create Tolet</h2>
        <div class="api-endpoint-bar">
          <span class="api-method-badge post">POST</span>
          <span class="api-endpoint-path">/tolets</span>
        </div>
        <div class="api-body-label">Request Body</div>
        <textarea id="create-json" class="api-json-editor">{
  "property": {
    "address": {
      "street": "123 Main Street",
      "unit": "Apt 4B",
      "city": "Ikeja",
      "state": "Lagos"
    },
    "role": "landlord",
    "landlord": {
      "firstName": "John",
      "lastName": "Doe",
      "email": "john@example.com"
    }
  },
  "requirements": {
    "modules": [
      "rentalApplication",
      "creditHistoryAndScore"
    ]
  },
  "note": "3-bedroom flat",
  "rent": {
    "amount": 1200000,
    "frequency": "yearly"
  },
  "isAcceptingApplications": true
}</textarea>
        <div class="api-request-footer">
          <span class="api-content-type">application/json</span>
          <button id="create-send-btn" class="api-send-btn">Send Request</button>
        </div>
        <div id="create-error" class="error hidden"></div>
        <a class="api-doc-link" href="https://registry.scalar.com/@tenalet/apis/tenalet-kit-api@latest#tag/tolets/POST/tolets" target="_blank" rel="noopener">View in API docs &rarr;</a>
      </div>

      <!-- Right: Tolet List -->
      <div class="card">
        <h2>Your Tolets</h2>
        <div id="tolet-list">
          <div class="empty">Loading...</div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
