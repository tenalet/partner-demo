<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tenalet Kit Demo - Screen Tenant</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav>
    <a href="/" class="brand">Tenalet Kit Demo</a>
    <span id="mode-badge" class="mode-badge"></span>
    <a href="/">Dashboard</a>
    <a href="/webhooks.html">Webhooks</a>
  </nav>

  <div class="screen-layout">
    <!-- Tenant form (shown before embed starts) -->
    <div class="card" id="tenant-form-card">
      <h2>Screen Tenant</h2>
      <p class="mb-8" style="font-size:13px;color:#777;">Property: <strong id="tolet-name">-</strong></p>
      <div class="api-endpoint-bar">
        <span class="api-method-badge post">POST</span>
        <span class="api-endpoint-path" id="app-endpoint-path">/tolets/{toletId}/applications</span>
      </div>
      <div class="api-body-label">Request Body</div>
      <textarea id="app-json" class="api-json-editor">{
  "externalUserId": "usr_abc123",
  "firstName": "Kemi",
  "lastName": "Adebayo",
  "phone": "+2348012345678"
}
</textarea>
      <div class="api-request-footer">
        <span class="api-content-type">application/json</span>
        <button id="start-btn" class="api-send-btn">Send Request</button>
      </div>
      <div id="screen-error" class="error hidden"></div>
      <a class="api-doc-link" href="https://registry.scalar.com/@tenalet/apis/tenalet-kit-api@latest#tag/applications/POST/tolets/{toletId}/applications" target="_blank" rel="noopener">View in API docs &rarr;</a>
    </div>

    <!-- Embed view (shown after form submit) -->
    <div class="hidden" id="embed-view">
      <div class="screen-toolbar">
        <div class="size-buttons">
          <button class="size-btn" data-size="375">Mobile</button>
          <button class="size-btn" data-size="768">Tablet</button>
          <button class="size-btn active" data-size="100%">Desktop</button>
        </div>
        <button class="log-toggle-btn" id="log-toggle">
          Event Log <span class="log-badge hidden" id="log-badge">0</span>
        </button>
      </div>

      <div class="embed-frame">
        <div id="tenalet-embed-wrapper">
          <div id="tenalet-app"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Log drawer -->
  <div class="log-drawer" id="log-drawer">
    <div class="log-drawer-header">
      <h3>Event Log</h3>
      <button class="log-drawer-close" id="log-drawer-close">&times;</button>
    </div>
    <div class="event-log" id="event-log">Waiting for events...\n</div>
  </div>
  <div class="log-drawer-overlay hidden" id="log-overlay"></div>

  <script src="/js/api.js"></script>
  <script src="/js/screen.js"></script>
</body>
</html>
